spring.application.name=magic-tale-service

spring.ai.retry.enabled=false
spring.ai.gemini.api-key=${GEMINI_API_KEY}
spring.ai.gemini.model=gemini-2.5-flash
spring.ai.gemini.project-id=gen-lang-client-0149166558

spring.ai.google.genai.api-key=${GEMINI_API_KEY}
spring.ai.google.genai.chat.options.model=gemini-2.5-flash
spring.ai.google.genai.project-id=gen-lang-client-0149166558
spring.ai.google.genai.chat.model=gemini-2.5-flash

spring.ai.openai.api-key=${OPENAI_API_KEY}
spring.ai.openai.chat.options.model=gpt-4o-mini

# Supported values: gemini, openai, anthropic
chat.model=${CHAT_MODEL:all}

# Supported values: openai, leonardo, none
image.model=${IMAGE_MODEL:huggingface}

#----------image models-----------#

# OpenAI image generation — only active when image.model=openai
spring.ai.openai.image.options.model=gpt-image-1
spring.ai.openai.image.options.width=1024
spring.ai.openai.image.options.height=1024

spring.ai.anthropic.api-key=${ANTHROPIC_API_KEY}
spring.ai.anthropic.chat.options.model=claude-sonnet-4-6
spring.ai.anthropic.chat.options.max-tokens=16000

# Leonardo AI image generation — only active when image.model=leonardo
leonardo.api-key=${LEONARDO_API_KEY:}
leonardo.model-id=${LEONARDO_MODEL_ID:b24e16ff-06e3-43eb-8d33-4416c2d75876}

# Leonardo quality/credit settings.
# Low quality (default) — ~5 credits per image:
#   width=512, height=512, alchemy=false, num-inference-steps=10,
#   enhance-prompt=false, high-resolution=false
# High quality — ~15-25 credits per image:
#   width=1024, height=1024, alchemy=true, num-inference-steps=20,
#   enhance-prompt=true, high-resolution=false
leonardo.width=${LEONARDO_WIDTH:512}
leonardo.height=${LEONARDO_HEIGHT:512}
leonardo.alchemy=${LEONARDO_ALCHEMY:false}
leonardo.num-inference-steps=${LEONARDO_NUM_INFERENCE_STEPS:10}
leonardo.enhance-prompt=${LEONARDO_ENHANCE_PROMPT:false}
leonardo.high-resolution=${LEONARDO_HIGH_RESOLUTION:false}

# hugging face image model
huggingface.api-key=${HUGGINGFACE_API_KEY:}
huggingface.model=${HUGGINGFACE_MODEL:black-forest-labs/FLUX.1-schnell}

#----------image models-----------#

server.port=${PORT:8080}

# MySQL Database
spring.datasource.url=jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:magictale}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.username=${DB_USER:magictale}
spring.datasource.password=${DB_PASSWORD:magictale123}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.database-platform=org.hibernate.dialect.MySQL8Dialect
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect

# Admin audit endpoint password and allowed IP
admin.audit.password=${ADMIN_AUDIT_PASSWORD:admin123}
admin.audit.allowed-ip=${ADMIN_AUDIT_ALLOWED_IP:127.0.0.1}

# pdf generation settings
generate.pdf.image.enable=${GENERATE_PDF_IMAGE_ENABLE:true}

# Google OAuth2
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET}
spring.security.oauth2.client.registration.google.scope=email,profile

# JWT
jwt.secret=${JWT_SECRET:ThisIsASecretKeyForJWTTokenGenerationMustBe32Chars!}
jwt.expiration.ms=${JWT_EXPIRATION_MS:86400000}

# Frontend URL (used to redirect after OAuth2 login)
app.frontend.url=${FRONTEND_URL:http://localhost:4200}

logging.level.org.springframework.security=${LOG_LEVEL:INFO}
logging.level.org.springframework.web=${LOG_LEVEL:INFO}

# Actuator configuration for Docker health checks
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=when-authorized

#circuite breaker
resilience4j.circuitbreaker.instances.gemini.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.gemini.sliding-window-size=10
resilience4j.circuitbreaker.instances.gemini.minimum-number-of-calls=3

resilience4j.circuitbreaker.instances.anthropic.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.anthropic.sliding-window-size=10
resilience4j.circuitbreaker.instances.anthropic.minimum-number-of-calls=3

resilience4j.circuitbreaker.instances.openai.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.openai.sliding-window-size=10
resilience4j.circuitbreaker.instances.openai.minimum-number-of-calls=3

resilience4j.circuitbreaker.instances.openai-image.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.openai-image.sliding-window-size=10
resilience4j.circuitbreaker.instances.openai-image.minimum-number-of-calls=3

resilience4j.circuitbreaker.instances.leonardo.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.leonardo.sliding-window-size=10
resilience4j.circuitbreaker.instances.leonardo.minimum-number-of-calls=3

resilience4j.circuitbreaker.instances.huggingface.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.huggingface.sliding-window-size=10
resilience4j.circuitbreaker.instances.huggingface.minimum-number-of-calls=3

# retry
resilience4j.retry.instances.chatApiRetry.max-attempts=6
resilience4j.retry.instances.chatApiRetry.wait-duration=1000ms
resilience4j.retry.instances.imageApiRetry.max-attempts=3
resilience4j.retry.instances.imageApiRetry.wait-duration=500ms

#logs
logging.level.com.fusion.psb=DEBUG