chat.model=openai
image.model=leonardo

# Real key must be set as LEONARDO_API_KEY env var
leonardo.api-key=${LEONARDO_API_KEY:}
leonardo.model-id=${LEONARDO_MODEL_ID:b24e16ff-06e3-43eb-8d33-4416c2d75876}

# Low-quality defaults for tests — minimise credit usage
leonardo.width=512
leonardo.height=512
leonardo.alchemy=false
leonardo.num-inference-steps=10
leonardo.enhance-prompt=false
leonardo.high-resolution=false

# Dummy OpenAI key — not used when image.model=leonardo
spring.ai.openai.api-key=dummy
spring.ai.openai.chat.options.model=gpt-4o-mini
spring.ai.openai.image.options.model=gpt-image-1
spring.ai.openai.image.options.width=1024
spring.ai.openai.image.options.height=1024

# Dummy values to satisfy auto-configuration
spring.ai.gemini.api-key=dummy
spring.ai.gemini.model=gemini-2.5-flash
spring.ai.gemini.project-id=dummy
spring.ai.google.genai.api-key=dummy
spring.ai.google.genai.chat.options.model=gemini-2.5-flash
spring.ai.google.genai.project-id=dummy
spring.ai.anthropic.api-key=dummy
spring.ai.anthropic.chat.options.model=claude-sonnet-4-6
spring.ai.anthropic.chat.options.max-tokens=16000

# In-memory H2 for tests
spring.datasource.url=jdbc:h2:mem:leonardotestdb
spring.jpa.hibernate.ddl-auto=create-drop

# Dummy OAuth2 credentials
spring.security.oauth2.client.registration.google.client-id=dummy
spring.security.oauth2.client.registration.google.client-secret=dummy
spring.security.oauth2.client.registration.google.scope=email,profile

generate.pdf.image.enable=true
admin.audit.password=test
admin.audit.allowed-ip=all
app.frontend.url=http://localhost:4200
jwt.secret=ThisIsASecretKeyForJWTTokenGenerationMustBe32Chars!
