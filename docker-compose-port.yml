version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: magictale-mysql
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-rootpassword}
      MYSQL_DATABASE: ${DB_NAME:-magictale}
      MYSQL_USER: ${DB_USER:-magictale}
      MYSQL_PASSWORD: ${DB_PASSWORD:-magictale123}
    ports:
      - "3309:3306" # Maps host 3309 to standard internal MySQL 3306
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped
    networks:
      - app-network

  magictale-website:
    image: abhishekatfusion/magictale-website:latest
    container_name: magictale-website
    ports:
      - "8083:80" # Maps host port 8083 to internal container web server port 80
    restart: unless-stopped
    networks:
      - app-network
      - traefik-public # Allows Traefik to reach this container
    labels:
      - "traefik.enable=true"
      # Route for the frontend (e.g., magictale.local)
      - "traefik.http.routers.magictale-website.rule=Host(`magictale.local`)"
      - "traefik.http.routers.magictale-website.entrypoints=web" # Change to 'websecure' if using SSL/HTTPS
      # Tells Traefik which port Nginx/Apache listens to inside this container
      - "traefik.http.services.magictale-website.loadbalancer.server.port=80"

  magictale-service:
    # REPLACE with your actual image path after pushing to Docker Hub/Registry
    image: abhishekatfusion/magictale-service:latest
    container_name: magictale-service
    depends_on:
      mysql:
        condition: service_healthy
    ports:
      - "8084:8084"
    environment:
      # Database Configuration
      DB_HOST: mysql
      DB_PORT: 3306 # Secure internal routing port over virtual bridge network
      DB_NAME: ${DB_NAME:-magictale}
      DB_USER: ${DB_USER:-magictale}
      DB_PASSWORD: ${DB_PASSWORD:-magictale123}

      # Core settings
      PORT: 8084

      # AI Model Configuration
      CHAT_MODEL: ${CHAT_MODEL:-gemini}
      IMAGE_MODEL: ${IMAGE_MODEL:-leonardo}

      # Gemini API
      GEMINI_API_KEY: ${GEMINI_API_KEY}

      # OpenAI API
      OPENAI_API_KEY: ${OPENAI_API_KEY}

      # Anthropic API
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}

      # Leonardo AI Image Generation
      LEONARDO_API_KEY: ${LEONARDO_API_KEY}
      LEONARDO_MODEL_ID: ${LEONARDO_MODEL_ID:-b24e16ff-06e3-43eb-8d33-4416c2d75876}
      LEONARDO_WIDTH: ${LEONARDO_WIDTH:-512}
      LEONARDO_HEIGHT: ${LEONARDO_HEIGHT:-512}
      LEONARDO_ALCHEMY: ${LEONARDO_ALCHEMY:-false}
      LEONARDO_NUM_INFERENCE_STEPS: ${LEONARDO_NUM_INFERENCE_STEPS:-10}
      LEONARDO_ENHANCE_PROMPT: ${LEONARDO_ENHANCE_PROMPT:-false}
      LEONARDO_HIGH_RESOLUTION: ${LEONARDO_HIGH_RESOLUTION:-false}

      # Security
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
      JWT_SECRET: ${JWT_SECRET:-ThisIsASecretKeyForJWTTokenGenerationMustBe32Chars!}
      JWT_EXPIRATION_MS: ${JWT_EXPIRATION_MS:-86400000}

      # Admin settings
      ADMIN_AUDIT_PASSWORD: ${ADMIN_AUDIT_PASSWORD:-admin123}
      ADMIN_AUDIT_ALLOWED_IP: ${ADMIN_AUDIT_ALLOWED_IP:-127.0.0.1}

      # Application
      GENERATE_PDF_IMAGE_ENABLE: ${GENERATE_PDF_IMAGE_ENABLE:-true}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:8083}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}

    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8084/actuator/health" ] # Fixed internal port tracking
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped
    networks:
      - app-network
      - traefik-public # Allows Traefik to reach this container
    labels:
      - "traefik.enable=true"
      # Route for the backend API (e.g., api.magictale.local)
      - "traefik.http.routers.magictale-service.rule=Host(`api.magictale.local`)"
      - "traefik.http.routers.magictale-service.entrypoints=web" # Change to 'websecure' if using SSL/HTTPS
      # Tells Traefik which port your Spring Boot app listens to internally
      - "traefik.http.services.magictale-service.loadbalancer.server.port=8084"

volumes:
  mysql-data:
    driver: local

networks:
  app-network:
    driver: bridge
  traefik-public:
    external: true
